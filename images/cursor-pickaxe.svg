<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32">
  <defs>
    <filter id="outline" x="-15%" y="-15%" width="130%" height="130%">
      <feMorphology in="SourceAlpha" operator="dilate" radius="1" result="d"/>
      <feFlood flood-color="#0d1a18" result="c"/>
      <feComposite in="c" in2="d" operator="in" result="o"/>
      <feMerge><feMergeNode in="o"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g filter="url(#outline)">
    <!-- Head row 0 -->
    <rect x="6" y="0" width="2" height="2" fill="#7ef5ee"/>
    <rect x="8" y="0" width="2" height="2" fill="#3dc5be"/>
    <!-- Head row 1 -->
    <rect x="4" y="2" width="2" height="2" fill="#7ef5ee"/>
    <rect x="6" y="2" width="4" height="2" fill="#3dc5be"/>
    <rect x="10" y="2" width="2" height="2" fill="#2a9e97"/>
    <!-- Head row 2 -->
    <rect x="2" y="4" width="2" height="2" fill="#7ef5ee"/>
    <rect x="4" y="4" width="6" height="2" fill="#3dc5be"/>
    <rect x="10" y="4" width="4" height="2" fill="#2a9e97"/>
    <!-- Head row 3 (widest — hotspot here) -->
    <rect x="0" y="6" width="2" height="2" fill="#7ef5ee"/>
    <rect x="2" y="6" width="6" height="2" fill="#3dc5be"/>
    <rect x="8" y="6" width="4" height="2" fill="#2a9e97"/>
    <!-- Head row 4 -->
    <rect x="2" y="8" width="4" height="2" fill="#3dc5be"/>
    <rect x="6" y="8" width="4" height="2" fill="#2a9e97"/>
    <!-- Head row 5 -->
    <rect x="4" y="10" width="6" height="2" fill="#2a9e97"/>
    <!-- Handle row 0 -->
    <rect x="10" y="12" width="2" height="2" fill="#c49a6c"/>
    <rect x="12" y="12" width="2" height="2" fill="#8b6336"/>
    <!-- Handle row 1 -->
    <rect x="12" y="14" width="2" height="2" fill="#c49a6c"/>
    <rect x="14" y="14" width="2" height="2" fill="#8b6336"/>
    <!-- Handle row 2 -->
    <rect x="14" y="16" width="2" height="2" fill="#c49a6c"/>
    <rect x="16" y="16" width="2" height="2" fill="#8b6336"/>
    <!-- Handle row 3 -->
    <rect x="16" y="18" width="2" height="2" fill="#c49a6c"/>
    <rect x="18" y="18" width="2" height="2" fill="#8b6336"/>
    <!-- Handle row 4 -->
    <rect x="18" y="20" width="2" height="2" fill="#c49a6c"/>
    <rect x="20" y="20" width="2" height="2" fill="#8b6336"/>
    <!-- Handle row 5 (tip) -->
    <rect x="20" y="22" width="2" height="2" fill="#8b6336"/>
  </g>
</svg>
