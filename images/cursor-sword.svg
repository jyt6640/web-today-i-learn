<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32">
  <defs>
    <filter id="outline" x="-15%" y="-15%" width="130%" height="130%">
      <feMorphology in="SourceAlpha" operator="dilate" radius="1" result="d"/>
      <feFlood flood-color="#0d1a18" result="c"/>
      <feComposite in="c" in2="d" operator="in" result="o"/>
      <feMerge><feMergeNode in="o"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g filter="url(#outline)">
    <!-- Blade tip (lightest teal) -->
    <rect x="0" y="0" width="2" height="2" fill="#a8f0ea"/>
    <!-- Blade row 1 (2px wide diagonal) -->
    <rect x="0" y="2" width="2" height="2" fill="#40c8c0"/>
    <rect x="2" y="2" width="2" height="2" fill="#2a9e97"/>
    <!-- Blade row 2 -->
    <rect x="2" y="4" width="2" height="2" fill="#40c8c0"/>
    <rect x="4" y="4" width="2" height="2" fill="#2a9e97"/>
    <!-- Blade row 3 (junction) -->
    <rect x="4" y="6" width="2" height="2" fill="#40c8c0"/>
    <rect x="6" y="6" width="2" height="2" fill="#2a9e97"/>
    <!-- Guard upper-right arm (↗ direction, gold) -->
    <rect x="8"  y="4" width="2" height="2" fill="#f5c842"/>
    <rect x="10" y="2" width="2" height="2" fill="#f5c842"/>
    <rect x="12" y="0" width="2" height="2" fill="#ffe57a"/>
    <!-- Guard lower-left arm (↙ direction, gold) -->
    <rect x="2" y="8"  width="2" height="2" fill="#f5c842"/>
    <rect x="0" y="10" width="2" height="2" fill="#ffe57a"/>
    <!-- Handle (↘ diagonal, brown, 2px wide) -->
    <rect x="6"  y="8"  width="2" height="2" fill="#c49a6c"/>
    <rect x="8"  y="8"  width="2" height="2" fill="#7a5030"/>
    <rect x="8"  y="10" width="2" height="2" fill="#c49a6c"/>
    <rect x="10" y="10" width="2" height="2" fill="#7a5030"/>
    <rect x="10" y="12" width="2" height="2" fill="#c49a6c"/>
    <rect x="12" y="12" width="2" height="2" fill="#7a5030"/>
    <rect x="12" y="14" width="2" height="2" fill="#c49a6c"/>
    <rect x="14" y="14" width="2" height="2" fill="#7a5030"/>
    <!-- Pommel (3px wide block) -->
    <rect x="12" y="16" width="2" height="2" fill="#9a7040"/>
    <rect x="14" y="16" width="2" height="2" fill="#7a5030"/>
    <rect x="16" y="16" width="2" height="2" fill="#5c3d1e"/>
  </g>
</svg>
